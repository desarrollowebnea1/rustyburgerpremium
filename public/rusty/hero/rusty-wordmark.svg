<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" fill="none">
  <defs>
    <linearGradient id="rustyOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="45%" stop-color="#F18700"/>
      <stop offset="100%" stop-color="#C45F00"/>
    </linearGradient>
    <filter id="rustyShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="5" dy="6" stdDeviation="0" flood-color="#050505" flood-opacity="1"/>
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#050505" flood-opacity="0.28"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
    </filter>
  </defs>
  <text
    x="0"
    y="300"
    fill="url(#rustyOrange)"
    stroke="#050505"
    stroke-width="10"
    paint-order="stroke fill"
    font-family="Arial Black, Impact, sans-serif"
    font-size="300"
    font-weight="900"
    letter-spacing="-12"
    filter="url(#rustyShadow)"
  >RUSTY</text>
  <text
    x="8"
    y="470"
    fill="#050505"
    stroke="#F18700"
    stroke-width="4"
    paint-order="stroke fill"
    font-family="Arial Black, Impact, sans-serif"
    font-size="148"
    font-weight="900"
    letter-spacing="18"
    filter="url(#rustyShadow)"
  >BURGER</text>
</svg>
