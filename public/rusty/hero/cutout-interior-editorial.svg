<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1410"/>
      <stop offset="55%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#2A1810"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F18700" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F18700" stop-opacity="0"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
    </filter>
  </defs>
  <rect width="900" height="620" fill="url(#bg)"/>
  <rect x="0" y="380" width="900" height="240" fill="#141414"/>
  <rect x="60" y="0" width="120" height="620" fill="#F18700" opacity="0.12"/>
  <ellipse cx="450" cy="120" rx="280" ry="100" fill="url(#glow)"/>
  <rect x="180" y="200" width="540" height="8" rx="4" fill="#F18700" opacity="0.35"/>
  <rect x="220" y="240" width="460" height="6" rx="3" fill="#F2EFEA" opacity="0.12"/>
  <rect x="200" y="280" width="500" height="140" rx="4" fill="#1E1E1E"/>
  <rect x="240" y="310" width="80" height="80" rx="2" fill="#F18700" opacity="0.25"/>
  <rect x="360" y="300" width="120" height="100" rx="2" fill="#2A2A2A"/>
  <rect x="520" y="315" width="90" height="70" rx="2" fill="#F18700" opacity="0.18"/>
  <text x="48" y="580" fill="#F2EFEA" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" letter-spacing="6">RUSTY FOOD HOUSE</text>
  <text x="48" y="548" fill="#F18700" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="8">BURGER DEL DIA</text>
</svg>
